<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <!-- Login Section -->
    <section id="login" class=" flex-cols items-center mx-auto">
        <div class="login-container w-full px-6">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box max-w-md mx-auto border p-4 shadow-md my-[60px]">
            <div class="login-top items-center text-center">
    <img src="assets/github-logo.png" class="mx-auto" alt="">
    <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
    <p class="text-gray-500">Sign in to manage your issues</p>
 </div>

  <label class="label font-bold">Username</label>
  <input type="text" id="user" class="input rounded-sm w-full" placeholder="Enter Username"  />
  <p class="text-[#4A00FF]">Default: admin</p>

  <label class="label font-bold">Password</label>
  <input type="password" id="pass" class="input rounded-sm w-full" placeholder="Password" />
  <p class="text-[#4A00FF]">Default: admin123</p>
  <button class="btn btn-primary mt-4 rounded-sm" onclick="LogIn()">Login</button>
  <div class="flex w-full flex-col">
  <div class="divider">OR</div>
</div>
<div class="text-center">
    <p class="mb-[24px] text-gray-500">Demo Credentials:</p>
    <p><span class="font-bold">Username:</span> admin</p>
    <p class="mb-[36px]"><span class="font-bold">Password:</span> admin123</p>
</div>
</fieldset>
</div>
    </section>
    <!-- Loading Spinner -->
      <div id="loadingSpinner" class="h-[60vh] hidden justify-center items-center">
                    <span class="loading loading-spinner loading-xl"></span>
                    <span class="text-gray-400">loading.....</span>
            </div>
<main id="main-part" class="hidden">
    <!-- Navbar -->
     <div id="navbar"class="flex mx-auto py-[20px] bg-base-100 shadow-sm px-[40px]">
  <div class="flex-1 flex items-center gap-2">
    <img src="assets/github-logo.png" class="w-8 h-8" alt="">
    <p class="font-bold hidden sm:block">GitHub Issues Tracker</p>
  </div>
  <div class="flex gap-2">
    <input id="search-box"type="text" placeholder="Search Issues" class="input input-bordered w-24 md:w-auto" />
    <button class="btn btn-primary">
      <span class="hidden sm:inline">+New Issue</span>
      <span class="sm:hidden">+</span> </button>
    </button>
</div>
</div>
<!-- Issue types -->
 <div id="issues-type" class="w-[80%] mx-auto mt-[40px] shadow-md p-[20px] rounded-md">
  <button id="btn-all" class="filter-btn btn btn-primary">All</button>
  <button id="btn-open" class="filter-btn btn btn-outline">Open</button>
  <button id="btn-closed" class="filter-btn btn btn-outline">Closed</button>
 </div>
 <!-- Issue Counter -->
 <div id="issues-counter" class="flex justify-between w-[80%] mx-auto shadow-md rounded-md mt-[40px] p-[20px]">
  <div class="flex">
    <div><img src="assets/Aperture.png" class="" alt=""></div>
    <div>
      <h5 class="font-semibold"><span id="totalIssue">0</span> Issues</h5>
      <p class="text-gray-600">Track and manage your project issues</p>
    </div>
    </div>
    <div class="flex gap-2 items-center text-center">
      <span class="w-3 h-3 bg-green-400 rounded-full"></span>
      <span >Open</span>
      <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
      <span>Closed</span>
    </div>
 </div>
 <!-- Issues -->
 <div id="issue-card-container"class= "grid grid-cols-2 lg:grid-cols-4 gap-4 w-[80%] mx-auto mt-[40px]">
 </div>
 </main>
    <script src="script.js"></script>
</body>
</html>
